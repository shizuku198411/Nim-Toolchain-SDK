name: nim-toolchain-try
base: ubuntu@24.04

sdks:
  - name: try-nim-toolchain

actions:
  check-versions: |
    set -eux

    echo "== PATH =="
    echo "$PATH"

    echo "== commands =="
    command -v nim
    command -v nimble
    command -v nimpretty
    command -v nimgrep
    command -v nim-gdb

    echo "== nim =="
    nim --version

    echo "== nimble =="
    nimble --version

    echo "== nimpretty =="
    nimpretty --version

    echo "== nimgrep =="
    nimgrep --version

    echo "== nim-gdb =="
    nim-gdb --version